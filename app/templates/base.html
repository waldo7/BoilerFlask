<!doctype html>
<html lang="en">
<head>
    {% block head %}
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}FlaskStuct{% endblock %}</title>

    <!-- Bootstrap 5.3.8 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">

    <!-- Bootstrap Icons 1.13.1 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
          rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
    {% endblock %}
</head>
<body>
    <div class="container-fluid p-0">
        <div class="row g-0">

            <!-- Hamburger Button (mobile only per D-03) -->
            <button class="btn hamburger-btn d-md-none" type="button"
                    data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar"
                    aria-controls="mobileSidebar">
                <span class="navbar-toggler-icon"></span>
            </button>

            {% block sidebar %}
            <!-- Desktop Fixed Sidebar (visible >= 768px per D-03) -->
            <div class="sidebar-desktop d-none d-md-flex flex-column">
                <!-- Brand Header (D-06) -->
                <div class="sidebar-brand">
                    <i class="bi bi-house"></i> FlaskStuct
                </div>

                <!-- Navigation Links (D-05, D-08) -->
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a href="{{ url_for('main.index') }}"
                           class="nav-link {% if request.endpoint == 'main.index' %}active{% endif %}">
                            <i class="bi bi-speedometer2 me-2"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="{{ url_for('main.index') }}"
                           class="nav-link {% if request.endpoint == 'main.index' %}active{% endif %}">
                            <i class="bi bi-gear me-2"></i> Settings
                        </a>
                    </li>
                </ul>
            </div>

            <!-- Mobile Offcanvas Sidebar (visible < 768px per D-03) -->
            <div class="offcanvas offcanvas-start" tabindex="-1" id="mobileSidebar"
                 aria-labelledby="mobileSidebarLabel">
                <div class="offcanvas-header">
                    <h5 class="offcanvas-title" id="mobileSidebarLabel">
                        <i class="bi bi-house"></i> FlaskStuct
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"
                            aria-label="Close"></button>
                </div>
                <div class="offcanvas-body p-0">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a href="{{ url_for('main.index') }}"
                               class="nav-link {% if request.endpoint == 'main.index' %}active{% endif %}">
                                <i class="bi bi-speedometer2 me-2"></i> Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="{{ url_for('main.index') }}"
                               class="nav-link {% if request.endpoint == 'main.index' %}active{% endif %}">
                                <i class="bi bi-gear me-2"></i> Settings
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
            {% endblock %}

            <!-- Main Content Column -->
            <div class="content-col">
                {% block content %}{% endblock %}
            </div>

        </div>
    </div>

    {% block scripts %}
    <!-- TODO: Phase 2: Add extension JS, custom scripts here -->

    <!-- Bootstrap 5.3.8 JS Bundle CDN (with Popper, required for offcanvas) -->
    <!-- Placed at end of body per D-16 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
    {% endblock %}
</body>
</html>
