<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }} - BoilerFlask</title>

    <!-- Bootstrap 5.3.8 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">

    <!-- Bootstrap Icons 1.13.1 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
          rel="stylesheet">

    <!-- Inline centering styles for error page -->
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f8f9fa;
        }
        .error-container {
            text-align: center;
            padding: 2rem;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <i class="{{ icon }} display-1 text-muted mb-3"></i>
        <h1>{{ code }}</h1>
        <h2 class="h4 text-muted">{{ title }}</h2>
        <p class="lead">{{ message }}</p>
        <a href="{{ url_for('main.index') }}" class="btn btn-primary btn-lg mt-3">
            <i class="bi-house"></i> Go Home
        </a>
    </div>
</body>
</html>
