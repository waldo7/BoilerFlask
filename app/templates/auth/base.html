<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FlaskStuct{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          integrity="sha384-k3eSyKHfWTMx9QTkSAlNuqWClz60AQkNvdLHCPOQw1WXmXDhISxj7tNoGf8iYGe"
          rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css"
          rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body class="min-vh-100 d-flex align-items-center justify-content-center bg-light">

<div class="auth-container">
    <div class="text-center mb-4 auth-brand">
        <a href="{{ url_for('main.index') }}" class="text-decoration-none text-reset">
            <i class="bi bi-house display-6 text-primary"></i>
            <h4 class="mt-2 text-dark">FlaskStuct</h4>
        </a>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <div class="card shadow-sm">
        <div class="card-body p-4">
            {% block auth_content %}{% endblock %}
        </div>
    </div>

    <div class="text-center mt-4">
        <a href="{{ url_for('main.index') }}" class="text-decoration-none">
            <i class="bi bi-arrow-left"></i> Back to Home
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YBFApZP4aDvWDv+6CyJxHmeMOx4VxzQ4l9ysQJzRtNDhZ2qLz4LnbTvFSCguxqM"
        crossorigin="anonymous"></script>
</body>
</html>
